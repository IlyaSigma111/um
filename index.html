<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Математическая декада | Викторина</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            color: #1e293b;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
            position: relative;
        }

        /* СДВГ-ФОН для ананасового режима (анимированные частицы) */
        body.pineapple::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Летающие ананасы */
        .floating-pineapple {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            z-index: 0;
            animation: floatAround 8s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes floatAround {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(50px, -30px) rotate(15deg);
            }
            50% {
                transform: translate(-20px, -60px) rotate(-10deg);
            }
            75% {
                transform: translate(30px, 20px) rotate(5deg);
            }
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        /* Пульсирующие круги */
        .pulsing-circle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(251,146,60,0.3) 0%, rgba(234,88,12,0) 70%);
            z-index: 0;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
        }

        /* Движущиеся точки (СДВГ-эффект) */
        .adhd-dot {
            position: fixed;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: #f97316;
            border-radius: 50%;
            z-index: 0;
            animation: moveDot 5s linear infinite;
            opacity: 0.7;
        }

        @keyframes moveDot {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(var(--dx, 100px), var(--dy, 100px));
            }
        }

        /* Вращающиеся шестиугольники (пчелиные соты в бешеном ритме) */
        .spinning-hex {
            position: fixed;
            pointer-events: none;
            font-size: 3rem;
            z-index: 0;
            animation: spin 4s linear infinite;
            opacity: 0.3;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Зигзагообразные линии */
        .zigzag {
            position: fixed;
            pointer-events: none;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.15;
        }

        /* Контент должен быть поверх фона */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }
        .theme-toggle {
            background: #e2e8f0;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
            position: relative;
            z-index: 2;
        }
        body.dark .theme-toggle {
            background: #334155;
            color: #facc15;
        }
        body.pineapple .theme-toggle {
            background: #fed7aa;
            color: #ea580c;
        }
        .theme-toggle:hover {
            transform: scale(1.02);
        }

        .facts-section, .quiz-panel {
            position: relative;
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        /* СВЕТЛАЯ ТЕМА (обычная) */
        body.light {
            background: #f0f4f8;
            color: #1e293b;
        }
        body.light .facts-section,
        body.light .quiz-panel {
            background: rgba(255,255,255,0.95);
            border-color: #cbd5e1;
            color: #1e293b;
        }
        body.light .fact-text {
            background: #eef2ff;
            color: #1e293b;
        }
        body.light .question-card {
            background: #f8fafc;
            color: #1e293b;
        }
        body.light .timer {
            background: #1e293b;
            color: #facc15;
        }
        body.light .answer-input {
            background: white;
            color: #1e293b;
            border-color: #94a3b8;
        }

        /* ТЁМНАЯ ТЕМА (обычная) */
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .facts-section,
        body.dark .quiz-panel {
            background: rgba(30,41,59,0.95);
            border-color: #334155;
            color: #f1f5f9;
        }
        body.dark .fact-text {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .question-card {
            background: #0f172a;
            color: #e2e8f0;
        }
        body.dark .timer {
            background: #facc15;
            color: #0f172a;
        }
        body.dark .answer-input {
            background: #334155;
            color: #f1f5f9;
            border-color: #64748b;
        }

        /* АНАНАСОВЫЙ РЕЖИМ (светлый) - фон прозрачный, чтобы анимации были видны */
        body.pineapple {
            background: #fff7ed;
            color: #7c2d12;
        }
        body.pineapple .facts-section,
        body.pineapple .quiz-panel {
            background: rgba(255,251,235,0.92);
            border-color: #fed7aa;
            color: #7c2d12;
        }
        body.pineapple .fact-text {
            background: rgba(255,237,213,0.9);
            color: #7c2d12;
        }
        body.pineapple .question-card {
            background: rgba(255,241,230,0.9);
            color: #7c2d12;
        }
        body.pineapple .timer {
            background: #ea580c;
            color: #ffedd5;
        }
        body.pineapple .answer-input {
            background: #fff7ed;
            color: #7c2d12;
            border-color: #fdba74;
        }
        body.pineapple .row-indicator {
            background: #ea580c;
            color: white;
        }

        /* АНАНАСОВЫЙ + ТЁМНЫЙ */
        body.pineapple.dark {
            background: #2d1a0e;
            color: #fed7aa;
        }
        body.pineapple.dark .facts-section,
        body.pineapple.dark .quiz-panel {
            background: rgba(59,42,31,0.92);
            border-color: #78350f;
            color: #fed7aa;
        }
        body.pineapple.dark .fact-text {
            background: rgba(74,54,39,0.9);
            color: #fed7aa;
        }
        body.pineapple.dark .question-card {
            background: rgba(74,54,39,0.9);
            color: #fed7aa;
        }
        body.pineapple.dark .timer {
            background: #f59e0b;
            color: #2d1a0e;
        }
        body.pineapple.dark .answer-input {
            background: #5c402e;
            color: #fed7aa;
            border-color: #b45309;
        }

        .facts-section, .quiz-panel {
            border-radius: 32px;
            padding: 24px 28px;
            margin-bottom: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .facts-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 6px solid #f97316;
            padding-left: 20px;
        }
        .fact-text {
            font-size: 1.2rem;
            line-height: 1.45;
            padding: 20px;
            border-radius: 24px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .fact-nav {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
        .fact-btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }
        body.dark .fact-btn {
            background: #334155;
            color: #e2e8f0;
        }
        body.pineapple .fact-btn {
            background: #fed7aa;
            color: #7c2d12;
        }

        .quiz-panel {
            border-radius: 32px;
            padding: 24px 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid;
            transition: background 0.2s;
        }
        .row-indicator {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            background: #f97316;
            color: white;
            padding: 12px;
            border-radius: 60px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .countdown {
            text-align: center;
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            color: #f97316;
        }
        .question-card {
            padding: 24px;
            border-radius: 28px;
            margin: 16px 0;
            transition: background 0.2s;
        }
        .question-text {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 2.2rem;
            font-family: monospace;
            font-weight: bold;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .answer-input-area {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .answer-input {
            flex: 2;
            padding: 14px 20px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 2px solid;
            font-family: monospace;
            transition: background 0.2s, color 0.2s;
        }
        .check-btn {
            background: #f97316;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            color: white;
        }
        .check-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .feedback {
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 12px;
            padding: 12px;
            border-radius: 40px;
        }
        hr {
            margin: 20px 0;
        }
        .reset-progress {
            background: #475569;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            margin-top: 12px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .question-text { font-size: 1.2rem; }
            .facts-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <button class="theme-toggle" id="themeToggleBtn">🍍</button>
    </div>

    <div class="facts-section">
        <div class="facts-title">
            <span>📐</span> Интересные факты о математике
        </div>
        <div class="fact-text" id="factDisplay">
            Загрузка...
        </div>
        <div class="fact-nav">
            <button class="fact-btn" id="prevFactBtn">← Предыдущий</button>
            <button class="fact-btn" id="nextFactBtn">Следующий →</button>
        </div>
    </div>

    <div class="quiz-panel">
        <div class="row-indicator" id="rowLabel">Первый ряд</div>
        <div id="quizDynamicArea">
            <div class="countdown">▶ СТАРТ</div>
            <button id="startRoundBtn" style="padding:12px 24px; background:#f97316; border:none; border-radius:60px; font-weight:bold; color:white;">Начать раунд</button>
        </div>
        <hr>
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div><strong>Режим:</strong> <span id="modeLabel">Обычный</span></div>
            <button class="reset-progress" id="resetGameBtn">🔄 Сбросить прогресс (ряды/вопросы)</button>
        </div>
    </div>
</div>

<script>
    // ============= ФАКТЫ =============
    const factsList = [
        "Десятичная система счёта возникла из-за количества пальцев на руках — это самое естественное объяснение, почему мы считаем десятками.",
        "Компьютерная графика в фильмах — это чистая геометрия. CGI (компьютерная графика в фильмах вроде «Аватар» или «Властелин колец») основана на трёхмерной геометрии. Оживающие на экране монстры и персонажи стали возможны благодаря работам ирландского математика Уильяма Гамильтона, чьи открытия через сто лет нашли применение в 3D-моделировании.",
        "Пчелиные соты имеют шестиугольную форму не случайно. Среди всех фигур с одинаковым периметром наибольшую площадь имеет круг, но круги не могут заполнить плоскость без зазоров. Шестиугольник — это идеальный компромисс: он позволяет заполнить плоскость без пустот и при этом максимально экономит материал и воск. Пчёлы «решили» эту оптимизационную задачу миллионы лет назад.",
        "Спутниковая навигация невозможна без учёта теории относительности. Чтобы GPS определял ваше местоположение с точностью до метров, спутники передают сигналы с точной временной привязкой. При этом учитываются эффекты специальной и общей теории относительности Эйнштейна — без этих поправок ошибка накапливалась бы по несколько километров в день.",
        "Фотографии хранятся благодаря математике. Когда вы делаете фото на смартфон, изображение сжимается в формат JPEG. Для этого выполняется пять последовательных математических преобразований, включая дискретный анализ Фурье и теорию шифрования. Без этих вычислений одно фото занимало бы в десятки раз больше памяти.",
        "Навигатор прокладывает маршрут через «задачу коммивояжёра». GPS-навигатор и картографические сервисы используют алгоритмы поиска кратчайшего пути (например, алгоритм Дейкстры). Те же математические методы применяются для расчёта оптимальных маршрутов доставки, логистики и даже автопилота самолётов.",
        "Розы растут по геометрическому принципу, который раньше не встречался в природе. В 2025 году физики обнаружили, что форма лепестков роз определяется механической обратной связью, связанной с «внешней» геометрией. Лепестки «хотят» быть плоскими, но скручиваются в форму цилиндра — и в точках соединения образуются острые кончики. Это первый известный пример такого природного орнамента.",
        "Раковины моллюсков и рога козлов закручены по логарифмической спирали.",
        "Галстук можно завязать 177 147 способами — это строго доказанный математический результат.",
        "Миг — это реальная единица времени, которая длится примерно сотую долю секунды.",
        "Почему в казино всегда выигрывает заведение? У любой игры есть математическое ожидание выигрыша. В честной игре оно равно нулю. В казино оно всегда отрицательно для игрока (например, в рулетке с зеро — минус 1/37 от каждой ставки). Это называется «преимущество казино».",

        "10! секунд — это ровно 6 недель.",
        "Количество способов перетасовать колоду карт больше, чем атомов на Земле."
    ];

    // ============= ОБЫЧНЫЕ ЗАДАНИЯ =============
    const normalQuestions = [
        { text: "Пакет молока стоит 85 руб. за штуку. Какое максимальное число пакетов можно купить на 500 руб., если их цена снизится на 20%?", answer: "7" },
        { text: "Из шести букв разрезной азбуки составлено слово «ЗАДАЧА». Сколько различных последовательностей букв можно получить, переставляя карточки?", answer: "60" },
        { text: "В классе 9 детей. Какова вероятность, что хотя бы у двоих дни рождения в одном месяце? (Считать, что месяцы равновероятны, а дети не двойняшки).", answer: "0.98" },
        { text: "На четырёх карточках написаны цифры: 1, 2, 3, 4. Ребёнок случайным образом выкладывает их в ряд, получая четырёхзначное число. Какова вероятность, что это число окажется чётным?", answer: "0.5" },
        { text: "В турнире 6 игроков, каждый играет с каждым ровно один раз. Ничьих нет. Оказалось, что Саша выиграл ровно 4 партии. Какова вероятность, что он проиграл Пете? (Считать все распределения результатов равновероятными при условии 4 побед Саши).", answer: "0.2" },
        { text: "В команде 5 ребят: 3 мальчика и 2 девочки. Наугад выбирают капитана и его заместителя (разные ребята). Какова вероятность, что оба выбранных — мальчики?", answer: "0.3" },
        { text: "Родительский комитет закупил 20 пазлов для подарков детям в связи с окончанием учебного года, из них 8 с машинками и 12 с видами городов. Подарки распределяются случайным образом между 20 детьми, среди которых есть Петя. Найдите вероятность того, что Пете достанется пазл с машинками.", answer: "0.4" },
        { text: "В коробке лежат 5 красных, 4 синих и 3 зелёных шара. Случайным образом вытаскивают 2 шара без возвращения. Найдите вероятность того, что они окажутся разного цвета, если известно, что хотя бы один из них красный.", answer: "0.78" },
        { text: "На отрезке длиной 10 м случайным образом выбирают точку. Найдите вероятность того, что расстояние от неё до ближайшего конца отрезка больше 3 м.", answer: "0.4" },
        { text: "В магазине сначала повысили цену на 20%, а затем снизили на 20%. Как изменилась цена относительно первоначальной? (Ответ числом: -4 означает -4%)", answer: "-4" },
        { text: "В классе 30 детей. 20 любят математику, 15 — русский, 5 не любят ни то, ни другое. Найдите вероятность того, что случайно выбранный ребёнок любит оба предмета.", answer: "0.33" },
        { text: "Кирпич весит 1 кг и ещё полкирпича. Сколько весит целый кирпич?", answer: "2" },
        { text: "На озере растут кувшинки. Каждый день их количество удваивается. Известно, что полностью озеро зарастает за 48 дней. За сколько дней кувшинки закроют ровно половину озера?", answer: "47" },
        { text: "Пять землекопов за 5 часов выкапывают 5 метров канавы. Сколько землекопов нужно, чтобы выкопать 100 метров канавы за 100 часов?", answer: "5" },
        { text: "Представьте, что земной шар плотно обтянули по экватору верёвкой. Затем длину верёвки увеличили всего на 1 метр и снова равномерно растянули над поверхностью. Сможет ли в образовавшуюся щель пролезть мышь? (Ответ: да/нет)", answer: "да" }
    ];

    // ============= АНАНАСОВЫЕ ЗАДАНИЯ =============
    const pineappleQuestions = [
        { text: "🍍 Ананас стоит 85 руб. за штуку. Какое максимальное число ананасов можно купить на 500 руб., если их цена снизится на 20%?", answer: "7" },
        { text: "🍍 Из шести букв разрезной азбуки составлено слово «АНАНАС». Сколько различных последовательностей букв можно получить, переставляя карточки?", answer: "60" },
        { text: "🍍 В классе 9 ананасов. Какова вероятность, что хотя бы у двоих дни рождения в одном месяце? (Считать, что месяцы равновероятны, а дети не двойняшки).", answer: "0.98" },
        { text: "🍍 На четырёх карточках написаны цифры: 1, 2, 3, 4. Ананас случайным образом выкладывает их в ряд, получая четырёхзначное число. Какова вероятность, что это число окажется чётным?", answer: "0.5" },
        { text: "🍍 В турнире 6 ананасов, каждый играет с каждым ровно один раз. Ничьих нет. Оказалось, что синий ананас выиграл ровно 4 партии. Какова вероятность, что он проиграл красному ананасу? (Считать все распределения результатов равновероятными при условии 4 побед синего ананаса).", answer: "0.2" },
        { text: "🍍 В команде 5 ананасов: 3 синих и 2 красных. Наугад выбирают капитана и его заместителя (разные ананасы). Какова вероятность, что оба выбранных — синие?", answer: "0.3" },
        { text: "🍍 Ананасовый комитет закупил 20 пазлов для подарков детям ананасов в связи с окончанием учебного года, из них 8 с синими ананасами и 12 с видами зелёных ананасов. Подарки распределяются случайным образом между 20 детьми-ананасами, среди которых есть жёлтый ананас. Найдите вероятность того, что жёлтому ананасу достанется пазл с синими ананасами.", answer: "0.4" },
        { text: "🍍 В коробке лежат 5 красных ананасов, 4 синих ананаса и 3 зелёных ананаса. Случайным образом вытаскивают 2 ананаса без возвращения. Найдите вероятность того, что они окажутся разного цвета, если известно, что хотя бы один из них красный.", answer: "0.78" },
        { text: "🍍 На ананасе длиной 10 м случайным образом выбирают точку. Найдите вероятность того, что расстояние от неё до ближайшего конца ананаса больше 3 м.", answer: "0.4" },
        { text: "🍍 В магазине сначала повысили цену ананаса на 20%, а затем снизили на 20%. Как изменилась цена относительно первоначальной? (Ответ числом: -4 означает -4%)", answer: "-4" },
        { text: "🍍 В классе 30 ананасов. 20 любят математику, 15 — русский, 5 не любят ни то, ни другое. Найдите вероятность того, что случайно выбранный ананас любит оба предмета.", answer: "0.33" },
        { text: "🍍 Ананас весит 1 кг и ещё пол-ананаса. Сколько весит целый ананас?", answer: "2" },
        { text: "🍍 На озере растут ананасы. Каждый день их количество удваивается. Известно, что полностью озеро зарастает за 48 дней. За сколько дней ананасы закроют ровно половину озера?", answer: "47" },
        { text: "🍍 Пять ананасов за 5 часов выкапывают 5 метров ананасовой горы. Сколько ананасов нужно, чтобы выкопать 100 метров ананасовой горы за 100 часов?", answer: "5" },
        { text: "🍍 Представьте, что огромный ананас плотно обтянули по экватору верёвкой. Затем длину верёвки увеличили всего на 1 метр и снова равномерно растянули над поверхностью ананаса. Сможет ли в образовавшуюся щель пролезть мышь? (Ответ: да/нет)", answer: "да" }
    ];

    // ============= СОСТОЯНИЕ =============
    let currentMode = localStorage.getItem('mathMode') || 'normal';
    let currentTheme = localStorage.getItem('theme') || 'light';
    let currentQuestions = currentMode === 'normal' ? normalQuestions : pineappleQuestions;
    let currentFactIndex = parseInt(localStorage.getItem('factIndex')) || 0;
    let currentRow = parseInt(localStorage.getItem('currentRow')) || 0;
    let currentQuestionIndex = parseInt(localStorage.getItem('currentQuestionIdx')) || 0;
    
    let activeTimer = null;
    let activeCountdownInterval = null;
    let isAwaitingAnswer = false;
    let currentQuestionLock = false;

    // СДВГ-элементы
    let adhdInterval = null;
    let floatingElements = [];

    const themeToggle = document.getElementById('themeToggleBtn');
    const factDisplay = document.getElementById('factDisplay');
    const prevFactBtn = document.getElementById('prevFactBtn');
    const nextFactBtn = document.getElementById('nextFactBtn');
    const quizDynamicArea = document.getElementById('quizDynamicArea');
    const rowLabel = document.getElementById('rowLabel');
    const modeLabelSpan = document.getElementById('modeLabel');
    const resetGameBtn = document.getElementById('resetGameBtn');

    // ============= СДВГ-ФОН =============
    function startADHDFloor() {
        stopADHDFloor();
        if (currentMode !== 'pineapple') return;
        
        // Создаём контейнер для СДВГ-элементов
        const container = document.createElement('div');
        container.id = 'adhd-container';
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '100%';
        container.style.pointerEvents = 'none';
        container.style.zIndex = '0';
        container.style.overflow = 'hidden';
        document.body.appendChild(container);
        
        // 1. Летающие ананасы (15 штук)
        const pineappleEmojis = ['🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍', '🍍'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'floating-pineapple';
            el.textContent = pineappleEmojis[i % pineappleEmojis.length];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            el.style.animationDuration = (Math.random() * 6 + 5) + 's';
            el.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(el);
            floatingElements.push(el);
        }
        
        // 2. Пульсирующие круги (10 штук)
        for (let i = 0; i < 10; i++) {
            const circle = document.createElement('div');
            circle.className = 'pulsing-circle';
            circle.style.left = Math.random() * 100 + '%';
            circle.style.top = Math.random() * 100 + '%';
            circle.style.width = (Math.random() * 150 + 50) + 'px';
            circle.style.height = circle.style.width;
            circle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            circle.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(circle);
            floatingElements.push(circle);
        }
        
        // 3. Движущиеся точки (СДВГ-муравьи) - 50 штук
        for (let i = 0; i < 50; i++) {
            const dot = document.createElement('div');
            dot.className = 'adhd-dot';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            const dx = (Math.random() - 0.5) * 200;
            const dy = (Math.random() - 0.5) * 200;
            dot.style.setProperty('--dx', dx + 'px');
            dot.style.setProperty('--dy', dy + 'px');
            dot.style.animationDuration = (Math.random() * 4 + 3) + 's';
            dot.style.animationDelay = Math.random() * 3 + 's';
            container.appendChild(dot);
            floatingElements.push(dot);
        }
        
        // 4. Вращающиеся шестиугольники (8 штук)
        const hexSymbols = ['⬡', '⬢', '⬟', '🔶', '🔷', '🍍', '🍍'];
        for (let i = 0; i < 8; i++) {
            const hex = document.createElement('div');
            hex.className = 'spinning-hex';
            hex.textContent = hexSymbols[i % hexSymbols.length];
            hex.style.left = Math.random() * 100 + '%';
            hex.style.top = Math.random() * 100 + '%';
            hex.style.fontSize = (Math.random() * 2.5 + 1.5) + 'rem';
            hex.style.animationDuration = (Math.random() * 4 + 2) + 's';
            hex.style.animationDirection = Math.random() > 0.5 ? 'normal' : 'reverse';
            container.appendChild(hex);
            floatingElements.push(hex);
        }
        
        // 5. Мерцающий зигзаг SVG
        const zigzag = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        zigzag.setAttribute('class', 'zigzag');
        zigzag.style.position = 'fixed';
        zigzag.style.top = '0';
        zigzag.style.left = '0';
        zigzag.style.width = '100%';
        zigzag.style.height = '100%';
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        let d = 'M0,50 ';
        for (let i = 0; i < 20; i++) {
            d += `L${i * 50},${Math.sin(i) * 30 + 50} `;
        }
        path.setAttribute('d', d);
        path.setAttribute('stroke', '#f97316');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        path.setAttribute('opacity', '0.3');
        zigzag.appendChild(path);
        container.appendChild(zigzag);
        floatingElements.push(zigzag);
        
        // Анимируем зигзаг
        let angle = 0;
        adhdInterval = setInterval(() => {
            if (currentMode !== 'pineapple') return;
            angle += 0.05;
            const newPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let newD = 'M0,50 ';
            for (let i = 0; i <= 20; i++) {
                newD += `L${i * (window.innerWidth / 20)},${Math.sin(angle + i * 0.5) * 40 + 50} `;
            }
            newPath.setAttribute('d', newD);
            newPath.setAttribute('stroke', '#ea580c');
            newPath.setAttribute('stroke-width', '2');
            newPath.setAttribute('fill', 'none');
            newPath.setAttribute('opacity', '0.25');
            zigzag.innerHTML = '';
            zigzag.appendChild(newPath);
        }, 100);
    }
    
    function stopADHDFloor() {
        if (adhdInterval) {
            clearInterval(adhdInterval);
            adhdInterval = null;
        }
        const container = document.getElementById('adhd-container');
        if (container) container.remove();
        floatingElements = [];
    }
    
    function saveProgress() {
        localStorage.setItem('currentRow', currentRow);
        localStorage.setItem('currentQuestionIdx', currentQuestionIndex);
        localStorage.setItem('mathMode', currentMode);
        localStorage.setItem('theme', currentTheme);
        localStorage.setItem('factIndex', currentFactIndex);
    }

    function applyThemeAndMode() {
        document.body.classList.remove('light', 'dark', 'pineapple');
        document.body.classList.add(currentTheme);
        if (currentMode === 'pineapple') {
            document.body.classList.add('pineapple');
            modeLabelSpan.innerText = 'Ананасовый 🍍';
            themeToggle.textContent = '🍍';
            startADHDFloor();
        } else {
            modeLabelSpan.innerText = 'Обычный';
            themeToggle.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
            stopADHDFloor();
        }
        updateFactDisplay();
    }

    function updateFactDisplay() {
        factDisplay.innerText = factsList[currentFactIndex % factsList.length];
    }

    function switchMode() {
        currentMode = currentMode === 'normal' ? 'pineapple' : 'normal';
        currentQuestions = currentMode === 'normal' ? normalQuestions : pineappleQuestions;
        if (currentQuestionIndex >= currentQuestions.length) {
            currentQuestionIndex = 0;
        }
        saveProgress();
        applyThemeAndMode();
        refreshCurrentScreen();
    }
    
    function toggleTheme() {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        saveProgress();
        applyThemeAndMode();
        if (currentMode !== 'pineapple') {
            themeToggle.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
        }
        refreshCurrentScreen();
    }
    
    function refreshCurrentScreen() {
        const startBtn = document.getElementById('startRoundBtn');
        if (startBtn) {
            renderQuizReadyState();
        } else {
            const qData = currentQuestions[currentQuestionIndex % currentQuestions.length];
            if (qData) {
                renderQuestion(qData);
            } else {
                renderQuizReadyState();
            }
        }
        updateRowLabel();
    }
    
    function updateRowLabel() {
        const rowNames = ['Первый ряд', 'Второй ряд', 'Третий ряд'];
        rowLabel.innerText = rowNames[currentRow % 3];
    }
    
    function renderQuizReadyState() {
        if (activeTimer) clearInterval(activeTimer);
        if (activeCountdownInterval) clearInterval(activeCountdownInterval);
        isAwaitingAnswer = false;
        currentQuestionLock = false;
        quizDynamicArea.innerHTML = `
            <div class="countdown">📢 ${['ПЕРВЫЙ РЯД', 'ВТОРОЙ РЯД', 'ТРЕТИЙ РЯД'][currentRow % 3]}</div>
            <button id="startRoundBtn" style="padding:12px 24px; background:#f97316; border:none; border-radius:60px; font-weight:bold; color:white;">Начать раунд</button>
        `;
        const startBtn = document.getElementById('startRoundBtn');
        if (startBtn) startBtn.onclick = startRound;
    }
    
    function startRound() {
        if (activeTimer) clearInterval(activeTimer);
        if (activeCountdownInterval) clearInterval(activeCountdownInterval);
        let countdown = 3;
        quizDynamicArea.innerHTML = `<div class="countdown" id="countdownDisplay">${countdown}</div>`;
        const countdownEl = document.getElementById('countdownDisplay');
        activeCountdownInterval = setInterval(() => {
            countdown--;
            if (countdownEl) countdownEl.innerText = countdown;
            if (countdown <= 0) {
                clearInterval(activeCountdownInterval);
                const qData = currentQuestions[currentQuestionIndex % currentQuestions.length];
                renderQuestion(qData);
            }
        }, 1000);
    }
    
    function renderQuestion(qData) {
        if (activeTimer) clearInterval(activeTimer);
        isAwaitingAnswer = false;
        currentQuestionLock = false;
        const questionHtml = `
            <div class="question-card">
                <div class="question-text">❓ ${qData.text}</div>
                <div class="timer" id="timerDisplay">01:30</div>
                <div class="answer-input-area">
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите ответ (число или слово)" autocomplete="off">
                    <button id="checkAnswerBtn" class="check-btn">✅ Проверить</button>
                </div>
                <div id="feedbackArea" class="feedback"></div>
            </div>
        `;
        quizDynamicArea.innerHTML = questionHtml;
        const answerInput = document.getElementById('answerInput');
        const checkBtn = document.getElementById('checkAnswerBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        let timeLeft = 90;
        const updateTimer = () => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            if (timerDisplay) timerDisplay.innerText = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            if (timeLeft <= 0 && !currentQuestionLock) {
                clearInterval(activeTimer);
                currentQuestionLock = true;
                const fb = document.getElementById('feedbackArea');
                if (fb) fb.innerHTML = '<span style="color:#e74c3c;">⏰ Время вышло! Переход к следующему ряду...</span>';
                if (checkBtn) checkBtn.disabled = true;
                if (answerInput) answerInput.disabled = true;
                setTimeout(() => moveToNextRow(), 2500);
            }
        };
        updateTimer();
        activeTimer = setInterval(() => {
            timeLeft--;
            updateTimer();
        }, 1000);
        
        const checkAnswer = () => {
            if (currentQuestionLock) return;
            currentQuestionLock = true;
            clearInterval(activeTimer);
            const userAnswer = answerInput.value.trim().toLowerCase();
            const correctAnswer = qData.answer.toLowerCase();
            let isCorrect = false;
            if (!isNaN(parseFloat(userAnswer)) && isFinite(userAnswer) && !isNaN(parseFloat(correctAnswer))) {
                isCorrect = Math.abs(parseFloat(userAnswer) - parseFloat(correctAnswer)) < 0.01;
            } else {
                isCorrect = (userAnswer === correctAnswer);
            }
            const feedbackDiv = document.getElementById('feedbackArea');
            if (isCorrect) {
                feedbackDiv.innerHTML = '<span style="color:#2ecc71;">✅ ПРАВИЛЬНО! Молодцы!</span>';
            } else {
                feedbackDiv.innerHTML = `<span style="color:#e74c3c;">❌ НЕПРАВИЛЬНО. Правильный ответ: ${correctAnswer}</span>`;
            }
            if (checkBtn) checkBtn.disabled = true;
            if (answerInput) answerInput.disabled = true;
            setTimeout(() => moveToNextRow(), 3000);
        };
        if (checkBtn) checkBtn.onclick = checkAnswer;
        if (answerInput) answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });
    }
    
    function moveToNextRow() {
        if (activeTimer) clearInterval(activeTimer);
        currentRow = (currentRow + 1) % 3;
        currentQuestionIndex = (currentQuestionIndex + 1) % currentQuestions.length;
        saveProgress();
        updateRowLabel();
        renderQuizReadyState();
    }
    
    function resetGameProgress() {
        currentQuestionIndex = 0;
        currentRow = 0;
        saveProgress();
        if (activeTimer) clearInterval(activeTimer);
        if (activeCountdownInterval) clearInterval(activeCountdownInterval);
        renderQuizReadyState();
        updateRowLabel();
    }
    
    function init() {
        applyThemeAndMode();
        prevFactBtn.onclick = () => {
            currentFactIndex = (currentFactIndex - 1 + factsList.length) % factsList.length;
            saveProgress();
            updateFactDisplay();
        };
        nextFactBtn.onclick = () => {
            currentFactIndex = (currentFactIndex + 1) % factsList.length;
            saveProgress();
            updateFactDisplay();
        };
        themeToggle.onclick = () => {
            switchMode();
            toggleTheme();
        };
        resetGameBtn.onclick = resetGameProgress;
        renderQuizReadyState();
        updateRowLabel();
    }
    init();
</script>
</body>
</html>
